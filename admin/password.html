<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security — Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="adminSidebar"></aside>
        <main class="admin-content">
            <div class="admin-page-header">
                <h1 class="heading-lg">Security</h1>
                <p class="text-muted mt-1">Change your admin password</p>
            </div>
            <div id="successMsg" style="display:none;padding:var(--space-md);background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:var(--radius-md);margin-bottom:var(--space-lg);color:var(--success)"></div>
            <div id="errorMsg" style="display:none;padding:var(--space-md);background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:var(--radius-md);margin-bottom:var(--space-lg);color:var(--danger)"></div>
            <div class="glass-card" style="padding:var(--space-xl);max-width:500px">
                <form id="passwordForm">
                    <div class="form-group"><label class="form-label">Current Password</label><input type="password" id="current_password" class="form-input" required autocomplete="current-password"></div>
                    <div class="form-group"><label class="form-label">New Password</label><input type="password" id="new_password" class="form-input" required minlength="6" autocomplete="new-password"></div>
                    <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" id="confirm_password" class="form-input" required autocomplete="new-password"></div>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </div>
        </main>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <script src="../assets/js/admin.js"></script>
    <script>
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const newPw = document.getElementById('new_password').value;
            const confirmPw = document.getElementById('confirm_password').value;
            if (newPw !== confirmPw) { document.getElementById('errorMsg').style.display = 'block'; document.getElementById('errorMsg').textContent = 'Passwords do not match'; return; }
            btn.disabled = true; btn.textContent = 'Changing...';
            const result = await api('/api/admin_change_password', {
                method: 'POST',
                body: { current_password: document.getElementById('current_password').value, new_password: newPw }
            });
            if (result.success) { document.getElementById('successMsg').style.display = 'block'; document.getElementById('successMsg').textContent = 'Password changed'; this.reset(); }
            else { document.getElementById('errorMsg').style.display = 'block'; document.getElementById('errorMsg').textContent = result.error || 'Failed'; }
            btn.disabled = false; btn.textContent = 'Change Password';
        });
        renderSidebar();
    </script>
</body>
</html>
