<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue — Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
    <script src="../assets/js/app.js" defer></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="adminSidebar"></aside>
        <main class="admin-content">
            <div class="admin-page-header flex-between">
                <div><h1 class="heading-lg">Queue</h1></div>
                <div class="flex gap-xs" style="flex-wrap:wrap" id="filterBtns">
                    <button class="btn btn-primary btn-sm" data-filter="all" style="font-size:0.7rem;padding:4px 10px">All</button>
                    <button class="btn btn-ghost btn-sm" data-filter="pending" style="font-size:0.7rem;padding:4px 10px">Pending</button>
                    <button class="btn btn-ghost btn-sm" data-filter="playing" style="font-size:0.7rem;padding:4px 10px">Playing</button>
                    <button class="btn btn-ghost btn-sm" data-filter="completed" style="font-size:0.7rem;padding:4px 10px">Done</button>
                    <button class="btn btn-ghost btn-sm" data-filter="skipped" style="font-size:0.7rem;padding:4px 10px">Skipped</button>
                </div>
            </div>
            <div class="glass-card" style="padding:0;overflow:hidden">
                <table style="width:100%;border-collapse:collapse;font-size:0.8rem">
                    <thead>
                        <tr style="border-bottom:1px solid rgba(255,255,255,0.06)">
                            <th style="padding:8px 10px;width:32px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" style="accent-color:var(--gold)"></th>
                            <th style="padding:8px 10px;text-align:left">Song</th>
                            <th class="hide-mobile" style="padding:8px 10px">Room</th>
                            <th style="padding:8px 10px">Status</th>
                            <th class="hide-mobile" style="padding:8px 10px">Added By</th>
                            <th class="hide-mobile" style="padding:8px 10px">Date</th>
                            <th style="padding:8px 10px;width:60px"></th>
                        </tr>
                    </thead>
                    <tbody id="queueBody"></tbody>
                </table>
            </div>
            <div id="pagination" class="flex-between" style="margin-top:var(--space-sm)"></div>
        </main>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <div class="modal-overlay" id="confirmModal">
        <div class="modal glass-card" style="padding:var(--space-xl);text-align:center">
            <div id="confirmModalIcon" style="font-size:2.5rem;margin-bottom:var(--space-md)"></div>
            <h3 id="confirmModalTitle" class="heading-md" style="margin-bottom:var(--space-sm)"></h3>
            <p id="confirmModalMessage" class="text-muted" style="margin-bottom:var(--space-xl)"></p>
            <div class="flex gap-md" style="justify-content:center">
                <button class="btn btn-ghost" onclick="closeConfirmModal()">Cancel</button>
                <button class="btn btn-danger" id="confirmModalAction">Confirm</button>
            </div>
        </div>
    </div>
    <script src="../assets/js/admin.js"></script>
    <script>
        let currentFilter = 'all', currentPage = 1, perPage = 10;
        const STATUS_COLORS = { pending: 'rgba(255,255,255,0.15)', playing: 'rgba(212,175,55,0.2)', completed: 'rgba(39,174,96,0.2)', skipped: 'rgba(231,76,60,0.2)' };
        const STATUS_TEXT = { pending: 'rgba(255,255,255,0.6)', playing: '#D4AF37', completed: '#27AE60', skipped: '#E74C3C' };

        function loadQueue() {
            api('/api/admin_queue_list?filter=' + currentFilter + '&page=' + currentPage + '&per_page=' + perPage).then(data => {
                if (!data.success) return;
                const tbody = document.getElementById('queueBody');
                if (data.queue.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="padding:var(--space-2xl);text-align:center;color:rgba(255,255,255,0.3)">No songs in queue</td></tr>';
                } else {
                    tbody.innerHTML = data.queue.map(q => {
                        const date = new Date(q.created_at + 'Z').toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
                        const title = q.video_title.length > 45 ? q.video_title.substring(0, 45) + '...' : q.video_title;
                        return `<tr data-id="${q.id}" style="border-bottom:1px solid rgba(255,255,255,0.04)">
                            <td style="padding:6px 10px"><input type="checkbox" class="queue-checkbox" value="${q.id}" onchange="updateBulkActions()" style="accent-color:var(--gold)"></td>
                            <td style="padding:6px 10px"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;font-size:0.82rem" title="${q.video_title}">${title}</div></td>
                            <td class="hide-mobile" style="padding:6px 10px"><span style="color:var(--gold);font-weight:600;font-size:0.75rem;letter-spacing:0.05em">${q.room_code}</span></td>
                            <td style="padding:6px 10px"><span style="font-size:0.68rem;padding:2px 8px;border-radius:var(--radius-full);background:${STATUS_COLORS[q.status] || 'rgba(255,255,255,0.1)'};color:${STATUS_TEXT[q.status] || 'rgba(255,255,255,0.5)'};font-weight:500">${q.status}</span></td>
                            <td class="hide-mobile" style="padding:6px 10px;font-size:0.75rem;color:rgba(255,255,255,0.5)">${q.added_by}</td>
                            <td class="hide-mobile" style="padding:6px 10px;font-size:0.75rem;color:rgba(255,255,255,0.3)">${date}</td>
                            <td style="padding:6px 10px"><button class="btn btn-danger btn-sm" style="font-size:0.7rem;padding:2px 8px" onclick="deleteSong(${q.id})">Delete</button></td>
                        </tr>`;
                    }).join('');
                }
                document.getElementById('pagination').innerHTML = `<span style="font-size:0.72rem;color:rgba(255,255,255,0.35)">${data.total_rows} songs</span>` +
                    (data.total_pages > 1 ? `<div class="flex gap-xs">${data.page > 1 ? '<button class="btn-icon-only" onclick="goPage(' + (data.page - 1) + ')">‹</button>' : ''}<span style="font-size:0.72rem">Page ${data.page} of ${data.total_pages}</span>${data.page < data.total_pages ? '<button class="btn-icon-only" onclick="goPage(' + (data.page + 1) + ')">›</button>' : ''}</div>` : '');
            });
        }

        function goPage(p) { currentPage = p; loadQueue(); }
        function toggleSelectAll(el) { document.querySelectorAll('.queue-checkbox').forEach(cb => cb.checked = el.checked); }

        document.querySelectorAll('#filterBtns button').forEach(btn => {
            btn.addEventListener('click', function() {
                currentFilter = this.dataset.filter;
                currentPage = 1;
                document.querySelectorAll('#filterBtns button').forEach(b => b.className = 'btn btn-ghost btn-sm');
                this.className = 'btn btn-primary btn-sm';
                loadQueue();
            });
        });

        async function deleteSong(id) {
            showConfirmModal('🗑️', 'Delete Song?', 'This cannot be undone.', async function() {
                const data = await api('/api/admin_queue_manage', { method: 'POST', body: JSON.stringify({ action: 'delete', ids: [id] }) });
                if (data.success) { showToast('Song deleted', 'success'); loadQueue(); }
                else { showToast(data.error || 'Failed', 'error'); }
            });
        }

        renderSidebar();
        loadQueue();
    </script>
</body>
</html>
